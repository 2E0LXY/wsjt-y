name: Linux (Debian) build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            gfortran \
            qtbase5-dev qt5-qmake qttools5-dev qttools5-dev-tools \
            qtmultimedia5-dev libqt5multimedia5-plugins \
            libqt5serialport5-dev libqt5websockets5-dev \
            libqt5sql5-sqlite libqt5svg5-dev \
            libfftw3-dev \
            libboost-log-dev libboost-thread-dev \
            libhamlib-dev \
            libusb-1.0-0-dev libudev-dev \
            libportaudio-dev portaudio19-dev \
            asciidoctor libxml2-utils \
            nsis dpkg-dev

      - name: Configure (CMake)
        run: |
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DWSJT_SKIP_MANPAGES=ON \
            -DWSJT_GENERATE_DOCS=OFF \
            ..

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)

      - name: Package (.deb)
        run: |
          cd build
          cpack -G DEB
          ls -lh *.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: wsjt-z-linux-deb
          path: build/*.deb
          retention-days: 30

      - name: Create GitHub Release and upload .deb
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
          generate_release_notes: true
          body: |
            WSJT-Z ${{ github.ref_name }} — Linux Debian package

            Built on Ubuntu 22.04 (amd64). Compatible with Debian 12+ and Ubuntu 22.04+.

            Install:
            ```
            sudo dpkg -i wsjt-z_*.deb
            sudo apt-get install -f   # fix any missing deps
            ```
